name: Scheduled reboot

# Twice a week: Mon/Thu 06:00 UTC = Sun/Wed 23:00 Mountain Time (MST
# winter, MDT summer shifts the local clock to 00:00 the next day).
# Forces a Streamlit Cloud redeploy by committing an updated timestamp
# to webapp/.last_reboot; Streamlit Cloud watches main and redeploys
# on every push, which restarts the process and resets server RAM to
# baseline.
on:
  schedule:
    - cron: '0 6 * * 1,4'
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: scheduled-reboot
  cancel-in-progress: false

jobs:
  reboot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Update reboot timestamp
        run: |
          date -u +'%Y-%m-%dT%H:%M:%SZ' > webapp/.last_reboot
          echo "Updated webapp/.last_reboot:"
          cat webapp/.last_reboot

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add webapp/.last_reboot
          if git diff --cached --quiet; then
            echo "No changes to commit (timestamp unchanged within the same second)."
            exit 0
          fi
          git commit -m "chore: scheduled reboot $(date -u +'%Y-%m-%d')"
          git push origin main
