name: Keep Streamlit app warm

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl --fail --silent --show-error --location --max-redirs 20 --max-time 600 \
            --cookie-jar /tmp/streamlit-cookies.txt --cookie /tmp/streamlit-cookies.txt \
            --retry 3 --retry-delay 30 --retry-all-errors \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s final=%{url_effective}\n" \
            "https://mouse-microreactors.streamlit.app/?keepwarm=1"
