name: Keep Streamlit app warm

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl --fail --silent --show-error --max-time 600 \
            --retry 3 --retry-delay 30 --retry-all-errors \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            "https://mouse-microreactors.streamlit.app/?keepwarm=1"
